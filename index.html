<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة قياس الأداء المالي|</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #c2c1c1;
            --brand-color: #69cee3;
            --title-main: #351375;
            --text-normal: #15445a;
            --text-dept: #218caa;
            --accent-red: #d32f2f;
            --accent-green: #2e7d32;
        }

        body {
            font-family: "Helvetica Neue W23 for SKY", Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-normal);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 550px;
        }

        h1 { color: var(--title-main); text-align: center; font-size: 1.5rem; }

        .income-summary {
            background: #f1f8ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--brand-color);
        }

        .section-card {
            background-color: var(--brand-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        h2 { font-size: 1rem; color: var(--title-main); margin-top: 0; }

        .input-group { margin-bottom: 10px; text-align: right; }
        label { font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 5px; }

        select, input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #fff; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s;
        }

        .btn-fixed { background-color: #ef6c00; }
        .btn-var { background-color: var(--title-main); }

        .kpi-container {
            margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .kpi-box { padding: 12px; border-radius: 10px; text-align: center; background: #f9f9f9; border: 1px solid #eee; }

        .history-list { margin-top: 20px; border-top: 2px solid var(--brand-color); padding-top: 15px; }
        .history-item { 
            display: flex; justify-content: space-between; padding: 8px; 
            border-bottom: 1px dashed #ccc; font-size: 0.9rem; 
        }

        .dept-info { text-align: center; margin-top: 20px; font-weight: bold; color: var(--text-dept); font-size: 0.8rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-file-invoice-dollar"></i> لوحة قياس الأداء المالي</h1>

    <div class="income-summary">
        <div style="display:flex; justify-content:space-between;">
            <span>إجمالي الدخل الشهري:</span>
            <strong>21,924.87 ريال</strong>
        </div>
    </div>

    <div class="section-card">
        <h2><i class="fas fa-lock"></i> المصاريف الشهرية الثابتة</h2>
        <div class="input-group">
            <select id="fixedCategory">
                <option value="قرض الراجحي 1">قرض الراجحي 1 (6148 ريال)</option>
                <option value="قرض الراجحي 2">قرض الراجحي 2 (4562 ريال)</option>
                <option value="قرض الراجحي الجديد 1">قرض الراجحي الجديد 1 (8768 ريال)</option>
                <option value="فواتير ثابتة">فواتير ثابتة</option>
            </select>
        </div>
        <div class="input-group">
            <input type="number" id="fixedAmount" placeholder="المبلغ">
        </div>
        <button class="btn-fixed" onclick="saveRecord('fixedCategory', 'fixedAmount', 'ثابت')">تسجيل الالتزام</button>
    </div>

    <div class="section-card">
        <h2><i class="fas fa-shopping-cart"></i> المصاريف اليومية المتغيرة</h2>
        <div class="input-group">
            <select id="varCategory">
                <option value="الأكل والشرب">الأكل والشرب</option>
                <option value="وقود السيارة">وقود السيارة</option>
                <option value="مقاضي المنزل">مقاضي المنزل</option>
                <option value="نثريات">نثريات</option>
            </select>
        </div>
        <div class="input-group">
            <input type="number" id="varAmount" placeholder="المبلغ">
        </div>
        <button class="btn-var" onclick="saveRecord('varCategory', 'varAmount', 'متغير')">تسجيل المصروف</button>
    </div>

    <div class="kpi-container">
        <div class="kpi-box"><span>المصروفات</span><strong id="totalDisplay" style="color:var(--accent-red);">0</strong></div>
        <div class="kpi-box"><span>المتبقي</span><strong id="remainDisplay" style="color:var(--accent-green);">0</strong></div>
    </div>

    <div class="history-list" id="log">
        <strong>سجل العمليات:</strong>
    </div>

    <div class="dept-info">
      
    </div>
</div>

<script>
    const INCOME = 21924.87;

    window.onload = refreshUI;

    function saveRecord(catId, amtId, type) {
        const cat = document.getElementById(catId).value;
        const amt = parseFloat(document.getElementById(amtId).value);
        
        if (!amt) { alert("يرجى إدخال المبلغ"); return; }

        let records = JSON.parse(localStorage.getItem('salim_vault')) || [];
        records.push({ cat, amt, type, date: new Date().toLocaleDateString('ar-SA') });
        localStorage.setItem('salim_vault', JSON.stringify(records));

        document.getElementById(amtId).value = "";
        refreshUI(); // تحديث العرض فوراً
    }

    function refreshUI() {
        const records = JSON.parse(localStorage.getItem('salim_vault')) || [];
        const logDiv = document.getElementById('log');
        let total = 0;

        logDiv.innerHTML = "<strong>سجل العمليات:</strong>";
        
        records.slice().reverse().forEach(item => {
            total += item.amt;
            logDiv.innerHTML += `
                <div class="history-item">
                    <span>${item.cat} (${item.type})</span>
                    <strong>${item.amt.toLocaleString()} ريال</strong>
                </div>`;
        });

        document.getElementById('totalDisplay').innerText = total.toLocaleString() + " ريال";
        document.getElementById('remainDisplay').innerText = (INCOME - total).toLocaleString() + " ريال";
    }
</script>
</body>
</html>
