<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة قياس الأداء المالي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #c2c1c1;
            --brand-color: #69cee3;
            --title-main: #351375;
            --text-normal: #15445a;
            --accent-red: #d32f2f;
            --accent-green: #2e7d32;
        }

        body {
            font-family: "Helvetica Neue W23 for SKY", Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-normal);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 650px;
        }

        h1 { color: var(--title-main); text-align: center; font-size: 1.5rem; margin-bottom: 25px; }

        .income-summary {
            background: #f1f8ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--brand-color);
            text-align: center;
        }

        .section-card {
            background-color: var(--brand-color);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        h2 { font-size: 1rem; color: var(--title-main); margin-top: 0; display: flex; justify-content: space-between; align-items: center; }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .cat-btn {
            background: #fff;
            border: 1px solid var(--title-main);
            color: var(--title-main);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .cat-btn.active {
            background: var(--title-main);
            color: #fff;
        }

        .input-group { margin-bottom: 10px; text-align: right; }
        
        select, input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #fff; box-sizing: border-box; font-family: inherit;
        }

        .edit-toggle { font-size: 0.75rem; cursor: pointer; color: var(--title-main); text-decoration: underline; }

        button.main-action {
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; font-family: inherit;
        }

        .btn-fixed { background-color: #ef6c00; }
        .btn-var { background-color: var(--title-main); }

        .kpi-container {
            margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .kpi-box { padding: 12px; border-radius: 10px; text-align: center; background: #f9f9f9; border: 1px solid #eee; }

        .history-list { margin-top: 20px; border-top: 2px solid var(--brand-color); padding-top: 15px; }
        .history-item { 
            display: flex; justify-content: space-between; padding: 10px; 
            border-bottom: 1px dashed #ccc; font-size: 0.85rem; background: #fff;
        }

        footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-wallet"></i> لوحة قياس الأداء المالي</h1>

    <div class="income-summary">
        <div style="display:flex; justify-content:space-between; font-weight: bold;">
            <span>إجمالي الدخل الشهري:</span>
            <span>21,924.87 ريال</span>
        </div>
    </div>

    <div class="section-card">
        <h2>
            <span><i class="fas fa-lock"></i> المصاريف الشهرية الثابتة</span>
            <span class="edit-toggle" onclick="toggleEdit('fixedAmountWrap')">تعديل المبلغ؟</span>
        </h2>
        
        <div class="category-buttons">
            <div class="cat-btn active" onclick="updateFixedSubCats('loans')">القروض والتمويل</div>
            <div class="cat-btn" onclick="updateFixedSubCats('bills')">الفواتير والاشتراكات</div>
            <div class="cat-btn" onclick="updateFixedSubCats('regular')">مصاريف دورية</div>
        </div>

        <div class="input-group">
            <select id="fixedCategory"></select>
        </div>
        <div class="input-group" id="fixedAmountWrap" style="display: none;">
            <input type="number" id="fixedAmount" placeholder="أدخل مبلغاً مخصصاً">
        </div>
        <button class="main-action btn-fixed" onclick="saveFixed()">تسجيل الالتزام</button>
    </div>

    <div class="section-card">
        <h2><i class="fas fa-coins"></i> المصاريف اليومية المتغيرة</h2>
        
        <div class="category-buttons">
            <div class="cat-btn active" onclick="updateVarSubCats('food')">الأكل والشرب</div>
            <div class="cat-btn" onclick="updateVarSubCats('home')">البيت</div>
            <div class="cat-btn" onclick="updateVarSubCats('kids')">الأبناء</div>
            <div class="cat-btn" onclick="updateVarSubCats('cars')">السيارات</div>
            <div class="cat-btn" onclick="updateVarSubCats('wife')">الزوجة</div>
            <div class="cat-btn" onclick="updateVarSubCats('personal')">شخصية</div>
        </div>

        <div class="input-group">
            <select id="varSubCategory"></select>
        </div>
        <div class="input-group">
            <input type="number" id="varAmount" placeholder="المبلغ المصروف">
        </div>
        <button class="main-action btn-var" onclick="saveVariable()">تسجيل المصروف</button>
    </div>

    <div class="kpi-container">
        <div class="kpi-box"><span>إجمالي المصروفات</span><br><strong id="totalDisplay" style="color:var(--accent-red);">0</strong></div>
        <div class="kpi-box"><span>المتبقي</span><br><strong id="remainDisplay" style="color:var(--accent-green);">0</strong></div>
    </div>

    <div class="history-list" id="log"></div>

    <footer>حقوق التصميم محفوظة © 2026</footer>
</div>

<script>
    const INCOME = 21924.87;
    
    const fixedData = {
        loans: [
            { name: "قروض الراجحي 1", amt: 6148 },
            { name: "قروض الراجحي 2", amt: 4562 },
            { name: "قروض الراجحي 3", amt: 54 },
            { name: "قروض الراجحي 4", amt: 39 },
            { name: "قروض الراجحي الجديد 1", amt: 8768 },
            { name: "قروض الراجحي الجديدة 2", amt: 405 },
            { name: "قروض الراجحي جديد 3", amt: 1487 },
            { name: "القرض الاضافي", amt: 953 },
            { name: "قروض امكان 1", amt: 149.84 },
            { name: "قروض امكان 2", amt: 378.55 },
            { name: "تقسيط سيارة", amt: 945 },
            { name: "اقساط PC الاولاد", amt: 345 }
        ],
        bills: [
            { name: "فاتورة الانترنت", amt: 402 },
            { name: "فاتورة جوال ابو محمد", amt: 517 },
            { name: "فاتورة جوال أم محمد", amt: 46 },
            { name: "فاتورة الكهرباء", amt: 652 },
            { name: "فاتورة المياه", amt: 132 },
            { name: "اشتراك أمازون برايم", amt: 16 },
            { name: "اشتراك ديزني بلس", amt: 35 },
            { name: "اشتراك بين سبورت", amt: 90 },
            { name: "اشتراك يوتيوب", amt: 24 },
            { name: "اشتراك شاهد", amt: 69 }
        ],
        regular: [
            { name: "راتب العامل", amt: 200 },
            { name: "مصروف أم محمد الشهري", amt: 1400 }
        ]
    };

    const varData = {
        food: ["مطاعم", "سوبر ماركت", "حلويات/كافيهات", "مياه"],
        home: ["أدوات منزلية", "صيانة وأعطال", "منظفات"],
        kids: ["مستلزمات مدرسة", "ألعاب", "ملابس", "نثريات"],
        cars: ["وقود اكورد", "وقود اكسنت", "وقود اكسبيديشن", "صيانة/غسيل"],
        wife: ["مستلزمات", "هدايا"],
        personal: ["جوالات/نت إضافي", "حلاقة/عناية", "صدقات"]
    };

    window.onload = () => {
        updateFixedSubCats('loans');
        updateVarSubCats('food');
        refreshUI();
    };

    function updateFixedSubCats(key) {
        setActiveBtn(event, 'fixed');
        const select = document.getElementById('fixedCategory');
        select.innerHTML = "";
        fixedData[key].forEach(item => {
            select.innerHTML += `<option value="${item.name}" data-amt="${item.amt}">${item.name} (${item.amt} ريال)</option>`;
        });
    }

    function updateVarSubCats(key) {
        setActiveBtn(event, 'var');
        const select = document.getElementById('varSubCategory');
        select.innerHTML = "";
        varData[key].forEach(item => {
            select.innerHTML += `<option value="${item}">${item}</option>`;
        });
    }

    function setActiveBtn(e, section) {
        if (!e || !e.target.classList.contains('cat-btn')) return;
        const btns = e.target.parentElement.querySelectorAll('.cat-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
    }

    function toggleEdit(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    function saveFixed() {
        const select = document.getElementById('fixedCategory');
        const cat = select.value;
        const manualAmt = document.getElementById('fixedAmount').value;
        const amt = manualAmt ? parseFloat(manualAmt) : parseFloat(select.options[select.selectedIndex].getAttribute('data-amt'));
        
        processStorage(cat, amt, 'ثابت');
        document.getElementById('fixedAmount').value = "";
        document.getElementById('fixedAmountWrap').style.display = 'none';
    }

    function saveVariable() {
        const cat = document.getElementById('varSubCategory').value;
        const amt = parseFloat(document.getElementById('varAmount').value);
        if (!amt) return;
        processStorage(cat, amt, 'متغير');
        document.getElementById('varAmount').value = "";
    }

    function processStorage(cat, amt, type) {
        let records = JSON.parse(localStorage.getItem('salim_final_vault')) || [];
        records.push({ cat, amt, type, date: new Date().toLocaleDateString('ar-SA'), time: new Date().toLocaleTimeString('ar-SA') });
        localStorage.setItem('salim_final_vault', JSON.stringify(records));
        refreshUI();
    }

    function refreshUI() {
        const records = JSON.parse(localStorage.getItem('salim_final_vault')) || [];
        const logDiv = document.getElementById('log');
        let total = 0;

        logDiv.innerHTML = "<strong>سجل العمليات:</strong>";
        records.slice().reverse().forEach(item => {
            total += item.amt;
            logDiv.innerHTML += `
                <div class="history-item">
                    <span>${item.cat} <small>(${item.type})</small></span>
                    <strong>${item.amt.toLocaleString(undefined, {minimumFractionDigits: 2})} ريال</strong>
                </div>`;
        });

        document.getElementById('totalDisplay').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " ريال";
        document.getElementById('remainDisplay').innerText = (INCOME - total).toLocaleString(undefined, {minimumFractionDigits: 2}) + " ريال";
    }
</script>
</body>
</html>
